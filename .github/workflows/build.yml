name: Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore NuGet packages
        run: dotnet restore PointCloudUtils.csproj

      - name: Build (Release)
        run: dotnet build PointCloudUtils.csproj -c Release --no-restore

      # ── Installer ──────────────────────────────────────────
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: >
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DAppVersion="${{ steps.version.outputs.version }}"
          installer.iss

      # ── Artifacts ──────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PointCloudUtils
          path: build/

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: PointCloudUtils-Installer
          path: installer/*.exe

      # ── PR comment with download link ──────────────────────
      - name: Comment on PR with build link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `### :white_check_mark: Test build ready`,
              ``,
              `Download the installer and raw build from the **Artifacts** section:`,
              `**[View build artifacts](${runUrl}#artifacts)**`,
              ``,
              `| Artifact | Contents |`,
              `|---|---|`,
              `| **PointCloudUtils-Installer** | Setup .exe — run to install |`,
              `| **PointCloudUtils** | Raw build/ folder (DLL + addin + config) |`,
            ].join('\n');
            // Delete previous bot comments so we don't spam on re-runs
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.includes('Test build ready')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ── Release (only on v* tags) ────────────────────────────
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: PointCloudUtils-Installer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.exe'
          generate_release_notes: true
